# Safety Deposit Box Entities

# Base parent for all safety deposit boxes
- type: entity
  id: SafetyDepositBoxBase
  abstract: true
  parent: BaseStorageItem
  components:
  - type: GenericVisualizer
    visuals:
      enum.StorageVisuals.Open:
        base:
          True: { state: icon-open }
          False: { state: icon }
  - type: Storage
    whitelist:
      tags:
      - Document
      - Paper
      - Write
      components:
      - Clothing
    blacklist:
      components:
      - IdCard
#      - Currency
      - Store
#      - Gun
      - EncryptionKey
#      - Battery
#      - PowerCell
      - Implant
#      - ShockOnTrigger  # Prevents shock collars
#      - AdvancedCollar  # Prevents advanced collars
  - type: SafetyDepositBox
  - type: Appearance
  - type: Tag
    tags:
    - SafetyDepositBox

- type: entity
  id: SafetyDepositBoxTrial
  name: safety deposit box (trial)
  description: Standard secure storage for personal item transfer between shifts. This kind is freely rationed to crew aboard the "Arion", but limited to one per person.
  parent: SafetyDepositBoxBase
  components:
  - type: Sprite
    sprite: _WF/Objects/Economy/depositboxsmall.rsi
    state: icon
  - type: Item
    size: Small
  - type: Storage
    maxItemSize: Normal
    grid:
    - 0,0,1,1

- type: entity
  id: SafetyDepositBoxSmall
  name: safety deposit box (small)
  description: Standard secure storage for personal item transfer between shifts.
  parent: SafetyDepositBoxBase
  components:
  - type: Sprite
    sprite: _WF/Objects/Economy/depositboxsmall.rsi
    state: icon
  - type: Item
    size: Small
  - type: Storage
    maxItemSize: Normal
    grid:
    - 0,0,1,2

- type: entity
  id: SafetyDepositBoxMedium
  name: safety deposit box (medium)
  description: Standard secure storage for personal item transfer between shifts.
  parent: SafetyDepositBoxBase
  components:
  - type: Sprite
    sprite: _WF/Objects/Economy/depositboxmedium.rsi
    state: icon
  - type: Item
    size: Small
  - type: Storage
    maxItemSize: Normal
    grid:
    - 0,0,1,3

- type: entity
  id: SafetyDepositBoxLarge
  name: safety deposit box (large)
  description: Standard secure storage for personal item transfer between shifts.
  parent: SafetyDepositBoxBase
  components:
  - type: Sprite
    sprite: _WF/Objects/Economy/depositboxlarge.rsi
    state: icon
  - type: Item
    size: Small
  - type: Storage
    maxItemSize: Normal
    grid:
    - 0,0,2,2

- type: entity
  id: SafetyDepositConsole
  name: safety deposit box console
  description: "A console for purchasing and managing safety deposit boxes."
  parent: BaseStructure
  components:
  - type: Sprite
    netsync: false
    noRot: true
    sprite: _WF/Structures/Machines/atm/depositatm.rsi
    layers:
    - map: ["computerLayerBody"]
      state: icon
    - map: ["computerLayerScreen"]
      state: unshaded
  - type: SafetyDepositConsole
    boxSlot:
      name: safety-deposit-console-boxSlot
      insertSound: /Audio/Machines/scanning.ogg
      ejectSound: /Audio/Machines/tray_eject.ogg
      ejectOnBreak: true
      swap: false
      whitelist:
        tags:
        - SafetyDepositBox
  - type: ItemSlots
  - type: ContainerContainer
    containers:
      safety-deposit-console-boxSlot: !type:ContainerSlot
      machine_board: !type:Container
      machine_parts: !type:Container
  - type: ActivatableUI
    key: enum.SafetyDepositConsoleUiKey.Key
  - type: Machine
    board: SafetyDepositConsoleCircuitboard

  - type: UserInterface
    interfaces:
      enum.SafetyDepositConsoleUiKey.Key:
        type: SafetyDepositConsoleBoundUserInterface
  - type: Anchorable
  - type: Pullable
