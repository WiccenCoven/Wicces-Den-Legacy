- type: pointOfInterest
  id: MechHiveOutpost
  parent: BasePOI
  name: "Mechanoid Hive Outpost"
  minimumDistance: 13500
  maximumDistance: 16500
  spawnGroup: Required
  gridPath: /Maps/_WD/POI/mechhive.yml
  addComponents:
  - type: SolarPoweredGrid
    trackOnInit: true
    doNotCull: true

- type: gameMap
  id: MechHiveOutpost
  mapName: "Mechanoid Hive Outpost"
  mapPath: /Maps/_WD/POI/mechhive.yml
  minPlayers: 0
  stations:
    DragonsBreathRefinery:
      stationProto: MarketFrontierOutpost
      components:
        - type: StationNameSetup
          mapNameTemplate: 'Mechanoid Hive Outpost'
        - type: ExtraStationInformation
          iconPath: /Textures/_Mono/Objects/Misc/lpc.rsi/mtech.png
          stationSubtext: 'mechhive-subtext'
          stationDescription: 'mechhive-description'
          lobbySortOrder: 6
