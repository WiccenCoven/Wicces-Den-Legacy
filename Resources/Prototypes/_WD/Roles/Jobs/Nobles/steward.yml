- type: job
  id: Steward
  name: job-name-steward
  description: job-description-steward
  playTimeTracker: JobSteward
  requirements:
    - !type:OverallPlaytimeRequirement
      time: 72000 # 20 hrs
    - !type:RoleTimeRequirement
      role: JobSecurityGuard
      time: 7200 # 2 hrs as security guard - mono
  whitelisted: true
  startingGear: StewardGear
  alwaysUseSpawner: true
  icon: "JobIconQuarterMaster"
  requireAdminNotify: true
  supervisors: job-supervisors-shipbaron
  weight: 170
  displayWeight: 60
  canBeAntag: false
  guides: [ BasicLore ]
  accessGroups:
  - AllAccessSR
  special:
  - !type:AddImplantSpecial
    implants: [ MindShieldImplant ]
  - !type:AddComponentSpecial
    components:
      - type: CommandStaff
  - !type:GiveItemOnHolidaySpecial
    holiday: FrontierBirthday
    prototype: FrontierBirthdayGift

- type: startingGear
  id: StewardGear
  equipment:
    pocket1: WeaponDisabler
    ears: ClothingHeadsetCommand
  storage:
    back:
    - Flash

- type: playTimeTracker
  id: JobSteward

- type: entity
  id: SpawnPointSteward
  parent: SpawnPointHeadOfPersonnel
  name: steward
  components:
  - type: SpawnPoint
    job_id: Steward

- type: roleLoadout
  id: JobSteward
  groups:
  - NobleJumpsuit
  - NobleBackpack
  - NobleGloves
  - NobleOuterClothing
  - NobleFace
  - NobleGlasses
  #  - NobleEars # Commented this out because it's filled by the StartingGear component.
  - GeneralEncryptionKey
  - NobleShoes
  - NobleHead
  - NobleNeck
  - GeneralBoxSurvival
  - NoblePDA
  - GeneralWallet
  - GeneralCartridge
  - GeneralImplanter
  - GeneralFun
  - GeneralUtility
  - GeneralTrinkets
  - GeneralBureaucracy
  - NFSpeciesSpecific
