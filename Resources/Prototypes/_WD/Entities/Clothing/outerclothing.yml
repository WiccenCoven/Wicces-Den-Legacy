- type: entity
  parent: ClothingOuterHardsuitBase
  id: ClothingOuterHardsuitEcclesiaVicar
  name: Ecclesia Vicar hardsuit
  description: An Eccelsia branded hardsuit, designed for use by the Vicar. Armored and lightweight.
  components:
  - type: Sprite
    sprite: _Omu/Clothing/OuterClothing/Hardsuits/cybersunscientisthardsuit.rsi
  - type: Clothing
    sprite: _Omu/Clothing/OuterClothing/Hardsuits/cybersunscientisthardsuit.rsi
  - type: ToggleableClothing
    clothingPrototypes:
      head: ClothingHeadHelmetEcclesiaVicar
