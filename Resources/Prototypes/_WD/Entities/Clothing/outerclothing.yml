      coefficients:
        Blunt: 0.55
        Slash: 0.55
        Piercing: 0.5
        Heat: 0.5
        Radiation: 0.35
        Caustic: 0.2
  - type: ClothingSpeedModifier
    walkModifier: 0.9
    sprintModifier: 0.9
  - type: HeldSpeedModifier
