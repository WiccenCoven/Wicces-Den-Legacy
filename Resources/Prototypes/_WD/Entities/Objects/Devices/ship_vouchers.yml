- type: entity
  parent: BaseShipLPC
  id: ShipVoucherKnight
  name: Nymphknight LPC
  description: A small card that contains the data and materials for the flashforge of a Nymphknight ship from the Ship-grade Nanoforge aboard the Arion.
  components:
  - type: Sprite
    layers:
    - state: htech
    - state: stripetsfmc
    - state: vouchermilitary
  - type: ShipyardVoucher
    redemptionsLeft: 9999 # Effectively infinite.
    destroyOnEmpty: false
    consoleType: Knight
    access:
    - Security
    vessels: # Unless it's special, put the whole roster in!
    - CaputKnight
    - ManusKnight
  - type: StaticPrice
    vendPrice: 500000

