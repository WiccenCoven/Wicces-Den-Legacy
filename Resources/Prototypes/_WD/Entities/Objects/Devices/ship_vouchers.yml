#LPC base (just different sprites)
- type: entity
  abstract: true
  parent: BaseShipVoucher
  id: BaseShipLPC
  name: ship LPC
  description: Contains the necessary data for a shipyard console to produce a certain design.
  components:
  - type: Sprite
    sprite: _Mono/Objects/Misc/lpc.rsi

- type: entity
  parent: BaseShipLPC
  id: ShipVoucherKnight
  name: Nymphknight voucher
  description: A small card that contains the data and materials for the flashforge of a Nymphknight ship from the Ship-grade Nanoforge aboard the Arion.
  components:
  - type: Sprite
    layers:
    - state: htech
    - state: stripetsfmc
    - state: vouchermilitary
  - type: ShipyardVoucher
    redemptionsLeft: 9999 # Effectively infinite.
    destroyOnEmpty: false
    consoleType: Knight
    access:
    - Security
    vessels: # Unless it's special, put the whole roster in!
    - CaputKnight
    - ManusKnight
  - type: StaticPrice
    vendPrice: 500000

- type: entity
  parent: BaseShipLPC
  id: ShipVoucherCommoner
  name: Commoner's Guild LPC
  description: A small card that contains the data and materials for the flashforge of a Commoner's Guild ship from the Ship-grade Nanoforge aboard the Arion.
  components:
  - type: Sprite
    layers:
    - state: htech
    - state: stripepdv
    - state: vouchermilitary
  - type: ShipyardVoucher
    redemptionsLeft: 9999 # Effectively infinite.
    destroyOnEmpty: false
    consoleType: Commoner
    vessels: # Unless it's special, put the whole roster in!
    - Scarab
    - Liquidator
  - type: StaticPrice
    vendPrice: 500000
