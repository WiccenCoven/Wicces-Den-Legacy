- type: entity
  parent: BaseShipLPC
  id: ShipVoucherKnight
  name: Knight LPC
  description: A small card that contains the data and materials for the flashforge of a Knight branded ship from the Arion's Ship-grade Nanoforge.
  components:
  - type: Sprite
    layers:
    - state: htech
    - state: stripetsfmc
    - state: vouchermilitary
  - type: ShipyardVoucher
    redemptionsLeft: 9999 # Effectively infinite.
    destroyOnEmpty: false
    consoleType: Knight
    access:
    - Security
    vessels: # Unless it's special, put the whole roster in!
    - CaputKnight
    - ManusKnight
  - type: StaticPrice
    vendPrice: 500000

- type: entity
  parent: BaseShipLPC
  id: ShipVoucherCommoner
  name: Universal Commoner's Guild LPC
  description: A small card that contains the data and materials for the flashforge of any Guild branded ship from the Arion's Ship-grade Nanoforge.
  components:
  - type: Sprite
    layers:
    - state: htech
    - state: stripepdv
    - state: vouchermilitary
  - type: ShipyardVoucher
    redemptionsLeft: 9999 # Effectively infinite.
    destroyOnEmpty: false
    consoleType: Commoner
    vessels: # Unless it's special, put the whole roster in! In the order of how they appear below.
    # Size 1s / Starters
    - Scarab
    - SophantPiva
    - SophantSvinya
    - SophantTick
    # Size 2s / Midgame (>2 hour mark)
    - SophantSellsword
    - SophantTwilight
    - SophantAkula
    - SophantTayfun
    - SophantNatisk
    - SophantSirius
    # Size 3s / Endgame (>3 hour mark)
    - SophantMudskipper
  - type: StaticPrice
    vendPrice: 500000

