- type: entity
  id: BorgChassisMechhive
  parent: BaseBorgChassisRedacted
  name: Urchin
  description: A tender to a Mechanoid Hivefleet ship, to keep internal mechanisms intact.
  components:
  - type: Sprite
    layers:
    - state: synd_engi
    - state: synd_engi_e
      map: ["enum.BorgVisualLayers.Light"]
      shader: unshaded
      visible: false
    - state: synd_engi_l
      shader: unshaded
      map: ["light"]
      visible: false
  - type: LanguageKnowledge
    speaks:
    - TauCetiBasic
    - RobotTalk
    understands:
    - TauCetiBasic
    - RobotTalk
  - type: BorgChassis
    maxModules: 8
    moduleWhitelist:
      tags:
      - BorgModuleGeneric
      - BorgModuleEngineering
      - BorgModuleSyndicate
      - BorgModuleSyndicateAssault
    hasMindState: derelict_e
    noMindState: derelict_e_r
  - type: Construction
    node: derelictcyborg
  - type: InteractionPopup
    interactSuccessString: petting-success-derelict-cyborg
    interactFailureString: petting-failure-derelict-cyborg
    interactSuccessSound:
      path: /Audio/Ambience/Objects/periodic_beep.ogg
  - type: SiliconLawProvider
    laws: MechhiveLawset

- type: entity
  id: PlayerBorgMechhive
  parent: BorgChassisMechhive
  suffix: Battery, Module
  components:
  - type: ContainerFill
    containers:
      borg_brain:
      - PositronicBrain
      borg_module:
      - BorgModuleOperative
      - BorgModuleAdvancedWeapon
      - BorgModuleJetpack
      - BorgModuleAdvancedTool
      - BorgModuleConstruction
      - BorgModuleCable
      - BorgModuleRedactedRCD
      - BorgModuleGPS
  - type: ItemSlots
    slots:
      cell_slot:
        name: power-cell-slot-component-slot-name-default
        startingItem: PowerCellAntiqueProto
  - type: RandomMetadata
    nameSegments:
    - MonoRemnantBorgTitle
    - MonoRemnantAdjective
    - MonoRemnantNoun
    - MonoRemnantModifier

- type: entity
  id: PlayerBorgMechhiveGhostRole
  parent: PlayerBorgMechhive
  suffix: Ghost
  components:
  - type: GhostRole
    name: ghost-role-information-redacted-borg
    description: ghost-role-information-redacted-borg-description
    rules: ghost-role-information-silicon-rules
    raffle:
      settings: default
    prototype: RedactedBorg
  - type: GhostTakeoverAvailable

- type: entity
  id: PlayerBorgMechhiveGhostRolePlaytime
  parent: PlayerBorgMechhive
  suffix: Ghost, Playtime
  components:
  - type: GhostRole
    name: ghost-role-information-redacted-borg
    description: ghost-role-information-redacted-borg-description
    rules: ghost-role-information-silicon-rules
    raffle:
      settings: default
    requirements:
    - !type:OverallPlaytimeRequirement
      time: 1 # like none haha
  - type: GhostTakeoverAvailable

# Remnant AI core

- type: entity
  id: PlayerStationAiApocriton
  parent: PlayerStationAiEmpty
  suffix: Ghost Role, Apocriton
  components:
  - type: ContainerComp
    proto: AiHeldApocriton
    container: station_ai_mind_slot
  - type: ContainerFill
    containers:
      station_ai_mind_slot:
      - StationAiBrainApocriton
  - type: Sprite
    sprite: Mobs/Silicon/station_ai.rsi
    layers:
    - state: base
    - state: ai
      shader: unshaded
  - type: Anchorable

- type: entity
  id: StationAiBrainApocriton
  parent: StationAiBrain
  categories: [ HideSpawnMenu, DoNotMap ]
  components:
  - type: Sprite
  - type: SiliconLawProvider
    laws: ApocritonLawset
  - type: GhostRole
    name: ghost-role-information-redacted-core
    description: ghost-role-information-redacted-core-description
    rules: ghost-role-information-silicon-rules
    raffle:
      settings: default
    prototype: RemnantAICore
  - type: LanguageKnowledge
    speaks:
    - TauCetiBasic
    - RobotTalk
    understands:
    - TauCetiBasic
    - RobotTalk
  - type: Access
    groups:
    - AllAccess
    tags:
    - NuclearOperative
    - SyndicateAgent
  - type: GhostTakeoverAvailable
  - type: RandomMetadata
    nameSegments:
    - MonoRemnantCoreTitle
    - MonoRemnantAdjective
    - MonoRemnantNoun

- type: entity
  id: AiHeldApocriton
  parent: AiHeldMono
  categories: [ HideSpawnMenu ]
  components:
  - type: IntrinsicRadioTransmitter
    channels:
    - Common
    - Remnants
    - Traffic
  - type: ActiveRadio
    channels:
    - Common
    - Remnants
    - Traffic
  - type: CollectiveMind
    channels:
    - Binary
    defaultChannel: Binary
  - type: LanguageKnowledge
    speaks:
    - TauCetiBasic
    - RobotTalk
    understands:
    - TauCetiBasic
    - RobotTalk
