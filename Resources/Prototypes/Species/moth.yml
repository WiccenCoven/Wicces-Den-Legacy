- type: markingPoints
  id: MobMothMarkingLimits
  onlyWhitelisted: false # Mono
  points:
    Hair:
      points: 1 # Mono Moth Hair
      required: false
    FacialHair:
      points: 1 # Wicce
      required: false
    Tail:
      points: 9 # Wicce
      required: false # Wicce
#      defaultMarkings: [ MothWingsDefault ] # Wicce
    Snout:
      points: 9 # Wicce
      required: false
    HeadTop:
      points: 9 # Wicce
      required: false # Wicce
#      defaultMarkings: [ MothAntennasDefault ] # Wicce
    HeadSide:
      points: 9 # Wicce
      required: false
    Head:
      points: 9 # imp 1<4 # Wicce
      required: false
    Chest:
      points: 9 # imp 1<4 # Wicce
      required: false
    Legs:
      points: 9 # imp 2<4 # Wicce
      required: false
    Arms:
      points: 9 # imp 2<4 # Wicce
      required: false

